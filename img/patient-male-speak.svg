<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 420" fill="none">
<defs>
  <radialGradient id="skin" cx="36%" cy="28%" r="68%">
    <stop offset="0%"   stop-color="#FFD9A8"/>
    <stop offset="58%"  stop-color="#EFA864"/>
    <stop offset="100%" stop-color="#C07830"/>
  </radialGradient>
  <linearGradient id="hair" x1="35%" y1="0%" x2="65%" y2="100%">
    <stop offset="0%"   stop-color="#4A3018"/>
    <stop offset="100%" stop-color="#160802"/>
  </linearGradient>
  <linearGradient id="shirt" x1="0%" y1="0%" x2="80%" y2="100%">
    <stop offset="0%"   stop-color="#5ECAD8"/>
    <stop offset="100%" stop-color="#1A7CA8"/>
  </linearGradient>
  <radialGradient id="iris" cx="30%" cy="30%" r="70%">
    <stop offset="0%"   stop-color="#7A5038"/>
    <stop offset="100%" stop-color="#190904"/>
  </radialGradient>
  <linearGradient id="neck" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%"   stop-color="#C87832"/>
    <stop offset="38%"  stop-color="#EFA864"/>
    <stop offset="100%" stop-color="#C07030"/>
  </linearGradient>
  <radialGradient id="mouthIn" cx="50%" cy="15%" r="85%">
    <stop offset="0%"   stop-color="#7A1818"/>
    <stop offset="100%" stop-color="#380606"/>
  </radialGradient>
  <clipPath id="hclip">
    <ellipse cx="140" cy="185" rx="83" ry="97"/>
  </clipPath>
</defs>

<g>

<!-- ── SHIRT ── -->
<path d="M28 420 Q18 365 40 328 L96 312 L140 328 L184 312 L240 328 Q262 365 252 420Z" fill="url(#shirt)"/>
<ellipse cx="108" cy="322" rx="33" ry="13" fill="white" opacity="0.14"/>
<path d="M112 315 Q140 335 168 315" stroke="rgba(255,255,255,0.22)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

<!-- ── NECK ── -->
<path d="M120 275 L122 312 L158 312 L160 275 Q152 285 140 286 Q128 285 120 275Z" fill="url(#neck)"/>
<ellipse cx="122" cy="292" rx="8" ry="20" fill="rgba(0,0,0,0.09)"/>
<ellipse cx="158" cy="292" rx="8" ry="20" fill="rgba(0,0,0,0.09)"/>

<!-- ── HEAD (skin base) ── -->
<ellipse cx="140" cy="185" rx="83" ry="97" fill="url(#skin)"/>

<!-- ── HAIR — clipped to head ── -->
<g clip-path="url(#hclip)">
  <rect x="57" y="0"   width="166" height="152" fill="url(#hair)"/>
  <rect x="57" y="0"   width="26"  height="174" fill="url(#hair)"/>
  <rect x="197" y="0"  width="26"  height="174" fill="url(#hair)"/>
  <ellipse cx="124" cy="108" rx="38" ry="22" fill="rgba(105,68,32,0.6)"/>
</g>

<!-- ── EARS ── -->
<ellipse cx="59"  cy="202" rx="14" ry="18" fill="url(#skin)"/>
<ellipse cx="59"  cy="202" rx="8"  ry="11" fill="rgba(185,105,45,0.48)"/>
<ellipse cx="221" cy="202" rx="14" ry="18" fill="url(#skin)"/>
<ellipse cx="221" cy="202" rx="8"  ry="11" fill="rgba(185,105,45,0.48)"/>

<!-- ── HEAD SHADING ── -->
<ellipse cx="213" cy="192" rx="26" ry="60" fill="rgba(155,80,22,0.14)" clip-path="url(#hclip)"/>
<ellipse cx="128" cy="166" rx="36" ry="18" fill="rgba(255,235,180,0.26)" clip-path="url(#hclip)"/>
<ellipse cx="140" cy="274" rx="55" ry="12" fill="rgba(150,85,24,0.22)"/>

<!-- ── EYEBROWS (slightly raised for speaking) ── -->
<path d="M90 168 Q106 159 124 165"  stroke="#220C04" stroke-width="5.5" stroke-linecap="round" fill="none"/>
<path d="M156 165 Q174 159 190 168" stroke="#220C04" stroke-width="5.5" stroke-linecap="round" fill="none"/>

<!-- ── EYES (slightly wider) ── -->
<ellipse cx="107" cy="188" rx="20" ry="8"  fill="rgba(162,88,36,0.2)"/>
<ellipse cx="173" cy="188" rx="20" ry="8"  fill="rgba(162,88,36,0.2)"/>
<ellipse cx="107" cy="195" rx="17" ry="12" fill="white"/>
<ellipse cx="173" cy="195" rx="17" ry="12" fill="white"/>
<ellipse cx="107" cy="190" rx="17" ry="5"  fill="rgba(182,120,72,0.2)"/>
<ellipse cx="173" cy="190" rx="17" ry="5"  fill="rgba(182,120,72,0.2)"/>
<circle cx="107" cy="196" r="9.5"  fill="url(#iris)"/>
<circle cx="173" cy="196" r="9.5"  fill="url(#iris)"/>
<circle cx="107" cy="196" r="5.5"  fill="#0C0604"/>
<circle cx="173" cy="196" r="5.5"  fill="#0C0604"/>
<circle cx="101" cy="191" r="3.5"  fill="white" opacity="0.92"/>
<circle cx="167" cy="191" r="3.5"  fill="white" opacity="0.92"/>
<circle cx="112" cy="201" r="1.8"  fill="white" opacity="0.45"/>
<circle cx="178" cy="201" r="1.8"  fill="white" opacity="0.45"/>
<path d="M90 186 Q107 179 124 186"  stroke="#1C0804" stroke-width="2.2" fill="none" stroke-linecap="round"/>
<path d="M156 186 Q173 179 190 186" stroke="#1C0804" stroke-width="2.2" fill="none" stroke-linecap="round"/>

<!-- ── NOSE ── -->
<path d="M136 212 Q134 229 127 238 Q135 244 140 245 Q145 244 153 238 Q146 229 144 212" fill="rgba(178,98,40,0.22)"/>
<ellipse cx="132" cy="240" rx="5.5" ry="4"   fill="rgba(142,75,26,0.42)"/>
<ellipse cx="148" cy="240" rx="5.5" ry="4"   fill="rgba(142,75,26,0.42)"/>
<ellipse cx="140" cy="237" rx="7"   ry="4.5" fill="rgba(255,210,150,0.44)"/>

<!-- ── CHEEKS ── -->
<ellipse cx="83"  cy="230" rx="22" ry="15" fill="rgba(234,124,94,0.15)"/>
<ellipse cx="197" cy="230" rx="22" ry="15" fill="rgba(234,124,94,0.15)"/>

<!-- ── MOUTH (SPEAKING — open, teeth visible) ── -->
<!-- Upper lip -->
<path d="M117 256 Q129 249 140 251 Q151 249 163 256 Q153 261 140 261 Q127 261 117 256Z" fill="#AE6438"/>
<!-- Cupid's bow -->
<path d="M131 249 Q140 245 149 249" fill="#C47C50"/>
<!-- Mouth opening -->
<path d="M117 256 Q140 258 163 256 Q163 274 140 277 Q117 274 117 256Z" fill="url(#mouthIn)"/>
<!-- Upper teeth -->
<rect x="124" y="257" width="32" height="9" rx="4" fill="#F4EFE9"/>
<!-- Lower teeth hint -->
<rect x="126" y="268" width="28" height="5" rx="3" fill="#EAE4DE"/>
<!-- Lower lip -->
<path d="M117 256 Q140 280 163 256 Q156 274 140 277 Q124 274 117 256Z" fill="#C4825A"/>
<!-- Lower lip highlight -->
<ellipse cx="140" cy="274" rx="17" ry="6"   fill="rgba(255,195,150,0.38)"/>
<path d="M117 256 Q140 258 163 256" stroke="rgba(135,68,32,0.5)" stroke-width="1" fill="none"/>

</g>
</svg>
