<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmBot — ฝึกซักประวัติจ่ายยา</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a3a2a; --green-mid: #2d6a4f; --green-light: #52b788;
    --green-pale: #d8f3dc; --cream: #fefae0; --amber: #dda15e;
    --red-soft: #e76f51; --text: #1b2e23; --text-muted: #4a7c5f;
    --white: #ffffff; --shadow: 0 4px 24px rgba(26,58,42,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; background: var(--green-dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; background-image: radial-gradient(ellipse at 20% 50%, rgba(82,183,136,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(221,161,94,0.06) 0%, transparent 50%); }
  .app { width: 100%; max-width: 820px; display: flex; flex-direction: column; gap: 16px; }

  /* HEADER */
  .header { background: linear-gradient(135deg, var(--green-mid), var(--green-dark)); border: 1px solid rgba(82,183,136,0.3); border-radius: 20px; padding: 20px 28px; display: flex; align-items: center; justify-content: space-between; box-shadow: var(--shadow); }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { width: 48px; height: 48px; background: var(--green-light); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .header h1 { font-family: 'Noto Serif Thai', serif; color: var(--white); font-size: 20px; font-weight: 700; }
  .header p { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 2px; }
  .btn-eval { background: var(--amber); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-eval:hover { opacity: 0.85; }
  .btn-eval:disabled { opacity: 0.4; cursor: not-allowed; }

  /* API */
  .api-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(82,183,136,0.2); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .api-section label { color: rgba(255,255,255,0.7); font-size: 13px; white-space: nowrap; }
  .api-section input { flex: 1; min-width: 200px; background: rgba(0,0,0,0.3); border: 1px solid rgba(82,183,136,0.25); border-radius: 10px; padding: 10px 14px; color: white; font-family: monospace; font-size: 13px; outline: none; }
  .api-section input:focus { border-color: var(--green-light); }
  .api-section input::placeholder { color: rgba(255,255,255,0.3); }
  .api-status { font-size: 11px; white-space: nowrap; padding: 4px 10px; border-radius: 20px; }
  .api-status.ok { background: rgba(82,183,136,0.2); color: var(--green-light); }
  .api-status.err { background: rgba(231,111,81,0.2); color: var(--red-soft); }
  .btn-sm { border: none; border-radius: 8px; padding: 8px 14px; font-family: 'Sarabun', sans-serif; font-size: 13px; cursor: pointer; white-space: nowrap; }
  .btn-save { background: rgba(82,183,136,0.25); color: #52b788; border: 1px solid rgba(82,183,136,0.3); }
  .btn-del { background: rgba(231,111,81,0.15); color: #e76f51; border: 1px solid rgba(231,111,81,0.2); }

  /* SCENARIO */
  .scenario-section { background: rgba(255,255,255,0.05); border: 1px solid rgba(82,183,136,0.2); border-radius: 16px; padding: 16px 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .scenario-section label { color: rgba(255,255,255,0.7); font-size: 13px; white-space: nowrap; }
  .scenario-section select { flex: 1; min-width: 220px; background: rgba(0,0,0,0.3); border: 1px solid rgba(82,183,136,0.25); border-radius: 10px; padding: 10px 14px; color: white; font-family: 'Sarabun', sans-serif; font-size: 14px; outline: none; cursor: pointer; }
  .btn-start { background: var(--green-light); color: var(--green-dark); border: none; border-radius: 10px; padding: 10px 22px; font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-start:hover { background: #74c69d; transform: translateY(-1px); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* CHAT */
  .chat-container { background: var(--cream); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 480px; }
  .chat-header { background: var(--green-mid); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
  .patient-info { display: flex; align-items: center; gap: 10px; }
  .patient-avatar { width: 38px; height: 38px; background: var(--green-pale); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .patient-name { color: white; font-weight: 600; font-size: 15px; }
  .patient-role { color: rgba(255,255,255,0.6); font-size: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; transition: background 0.3s; }
  .status-dot.active { background: #69d38e; box-shadow: 0 0 8px #69d38e; }

  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px; min-height: 320px; max-height: 420px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(45,106,79,0.3); border-radius: 4px; }

  .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 34px; height: 34px; flex-shrink: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .msg.patient .msg-avatar { background: var(--green-pale); }
  .msg.user .msg-avatar { background: rgba(221,161,94,0.2); }
  .msg.system .msg-avatar { background: rgba(231,111,81,0.15); }
  .msg-bubble { max-width: 72%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.6; color: var(--text); }
  .msg.patient .msg-bubble { background: white; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .msg.user .msg-bubble { background: var(--green-mid); color: white; border-bottom-right-radius: 4px; }
  .msg.system .msg-bubble { background: rgba(82,183,136,0.08); border: 1px solid rgba(82,183,136,0.2); color: var(--green-mid); font-size: 13px; border-radius: 12px; max-width: 100%; width: 100%; text-align: center; }
  .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .msg.user .msg-time { text-align: right; }

  .thinking { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .thinking span { width: 7px; height: 7px; border-radius: 50%; background: var(--green-light); animation: bounce 1.2s infinite; }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  /* DISPENSE UI */
  .dispense-bar { background: white; border-top: 2px solid var(--amber); padding: 14px 16px; display: none; gap: 10px; align-items: center; flex-wrap: wrap; }
  .dispense-bar.show { display: flex; }
  .dispense-bar label { color: var(--amber); font-weight: 700; font-size: 14px; white-space: nowrap; }
  .dispense-bar input { flex: 1; min-width: 200px; border: 1.5px solid var(--amber); border-radius: 10px; padding: 10px 14px; font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--text); outline: none; }
  .dispense-bar input::placeholder { color: #bbb; }
  .btn-dispense { background: var(--amber); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .dispense-hint { width: 100%; font-size: 12px; color: #aaa; }

  /* INPUT */
  .input-area { border-top: 1px solid rgba(45,106,79,0.1); padding: 14px 16px; display: flex; gap: 10px; align-items: flex-end; background: white; }
  #textInput { flex: 1; border: 1px solid rgba(45,106,79,0.2); border-radius: 14px; padding: 12px 16px; font-family: 'Sarabun', sans-serif; font-size: 15px; color: var(--text); resize: none; outline: none; line-height: 1.5; max-height: 120px; transition: border-color 0.2s; }
  #textInput:focus { border-color: var(--green-light); }
  #textInput::placeholder { color: #aaa; }
  #textInput:disabled { background: #f5f5f5; }
  .btn-icon { width: 46px; height: 46px; border-radius: 14px; border: none; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
  .btn-mic { background: var(--green-pale); color: var(--green-mid); }
  .btn-mic:hover { background: var(--green-light); color: white; }
  .btn-mic.recording { background: var(--red-soft); color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .btn-send { background: var(--green-mid); color: white; }
  .btn-send:hover { background: var(--green-dark); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

  /* EVAL */
  .eval-section { display: none; background: var(--cream); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); }
  .eval-header { background: var(--green-dark); padding: 16px 24px; color: white; font-size: 16px; font-weight: 700; }
  .eval-body { padding: 20px 24px; }
  .eval-loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .score-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  @media(max-width:600px){ .score-grid { grid-template-columns: repeat(2,1fr); } }
  .score-card { background: white; border-radius: 14px; padding: 14px 10px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .score-num { font-size: 28px; font-weight: 700; font-family: 'Noto Serif Thai', serif; }
  .score-max { font-size: 12px; color: #bbb; }
  .score-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; line-height: 1.3; }
  .score-total { grid-column: 1/-1; background: var(--green-mid); color: white; }
  .score-total .score-num { color: white; font-size: 36px; }
  .score-total .score-label { color: rgba(255,255,255,0.8); }
  .score-green { color: var(--green-mid); }
  .score-amber { color: var(--amber); }
  .score-red { color: var(--red-soft); }
  .feedback-block { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; font-size: 14px; line-height: 1.8; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .feedback-block h3 { font-size: 14px; font-weight: 700; color: var(--green-mid); margin-bottom: 8px; }
  .missed-item { color: var(--red-soft); }
  .btn-new { width: 100%; background: var(--green-mid); color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-new:hover { background: var(--green-dark); }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

  /* DISPENSE LOG */
  .dispense-log { background: rgba(221,161,94,0.08); border: 1px solid rgba(221,161,94,0.3); border-radius: 10px; padding: 10px 14px; margin: 0 20px 10px; font-size: 13px; color: var(--amber); display: none; }
  .dispense-log.show { display: block; }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="logo">💊</div>
      <div>
        <h1>PharmBot</h1>
        <p>ระบบฝึกซักประวัติและจ่ายยา สำหรับนักศึกษาเภสัชศาสตร์</p>
      </div>
    </div>
    <span id="timerDisplay" style="color:rgba(255,255,255,0.5);font-size:13px;font-family:monospace;margin-right:8px;"></span><button class="btn-eval" id="evalBtn" disabled onclick="requestEvaluation()">📋 ประเมินผล</button>
  </div>

  <!-- API KEY -->
  <div class="api-section">
    <label>🔑 Groq API Key:</label>
    <input type="password" id="apiKey" placeholder="gsk_..." oninput="checkApiKey()">
    <button class="btn-sm btn-save" onclick="saveApiKey()">💾 จำไว้</button>
    <button class="btn-sm btn-del" onclick="clearApiKey()">🗑 ลบ</button>
    <span class="api-status" id="apiStatus">ยังไม่ได้ใส่</span>
  </div>

  <!-- SCENARIO -->
  <div class="scenario-section">
    <label>🏥 เลือกเคส:</label>
    <select id="scenarioSelect" onchange="onScenarioChange()">
      <option value="case001">🤒 เคส 1 — ไข้/หวัด/ปวดหัว [ง่าย]</option>
      <option value="case002">🤢 เคส 2 — ปวดท้อง/ท้องเสีย [ง่าย]</option>
      <option value="case003">😷 เคส 3 — ไอ/เจ็บคอ [กลาง]</option>
      <option value="case004">🤧 เคส 4 — ผื่นแพ้ยา [ยาก]</option>
      <option value="case005">🦵 เคส 5 — ปวดกล้ามเนื้อ Polypharmacy [ยาก]</option>
    </select>
    <button class="btn-start" id="startBtn" onclick="startSession()">▶ เริ่มเคส</button>
  </div>

  <!-- CHAT -->
  <div class="chat-container">
    <div class="chat-header">
      <div class="patient-info">
        <div class="patient-avatar" id="patientAvatar">👤</div>
        <div>
          <div class="patient-name" id="patientName">รอเริ่มเคส...</div>
          <div class="patient-role" id="patientMeta">เลือกเคสแล้วกด "เริ่มเคส"</div>
        </div>
      </div>
      <div class="status-dot" id="statusDot"></div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state">
        <div class="icon">🩺</div>
        <p>เลือกเคส แล้วกด <strong>"เริ่มเคส"</strong><br>คนไข้จะเป็นฝ่ายเปิดบทสนทนาก่อน</p>
      </div>
    </div>

    <!-- DISPENSE LOG -->
    <div class="dispense-log" id="dispenseLog"></div>

    <!-- DISPENSE UI -->
    <div class="dispense-bar" id="dispenseBar">
      <label>💊 จ่ายยา:</label>
      <input type="text" id="dispenseInput" placeholder="รูปแบบ: ชื่อยา ความแรง เช่น Paracetamol 500mg + CPM 4mg">
      <button class="btn-dispense" onclick="confirmDispense()">✓ ยืนยัน</button>
      <button onclick="cancelDispense()" style="background:rgba(231,111,81,0.15);color:#e76f51;border:1px solid rgba(231,111,81,0.3);border-radius:10px;padding:10px 16px;font-family:'Sarabun',sans-serif;font-size:14px;cursor:pointer;">✕ ยกเลิก</button>
      <span class="dispense-hint">คั่นหลายตัวด้วย + เช่น Paracetamol 500mg + CPM 4mg</span>
    </div>

    <!-- INPUT -->
    <div class="input-area">
      <textarea id="textInput" rows="1" placeholder="พิมพ์ หรือกดไมค์พูด..." onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
      <button class="btn-icon btn-mic" id="micBtn" onclick="toggleMic()" disabled>🎤</button>
      <button class="btn-icon btn-send" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>

  <!-- EVAL SECTION -->
  <div class="eval-section" id="evalSection">
    <div class="eval-header">📊 ผลการประเมิน</div>
    <div class="eval-body" id="evalBody"></div>
  </div>

</div>

<script src="core.js"></script>
<script src="cases/case001_fever.js"></script>
<script src="cases/case002_to_005.js"></script>
<script>

// ── Case registry ─────────────────────────────────────────────
const CASE_REGISTRY = {
  case001: CASE_001,
  case002: CASE_002,
  case003: CASE_003,
  case004: CASE_004,
  case005: CASE_005
};

// ── State ─────────────────────────────────────────────────────
let conversationHistory = [];
let currentCase = null;
let sessionActive = false;
let dispensedDrugs = '';
let counselingDone = false;
let recognition = null;
let isRecording = false;
let thinkingCounter = 0;
let sessionStartTime = null;
let timerInterval = null;

// ── API Key ───────────────────────────────────────────────────
function checkApiKey() {
  const key = document.getElementById('apiKey').value.trim();
  const status = document.getElementById('apiStatus');
  if (key.length > 20) { status.textContent = '✓ พร้อมใช้งาน'; status.className = 'api-status ok'; }
  else if (key.length > 0) { status.textContent = '✗ ไม่ถูกต้อง'; status.className = 'api-status err'; }
  else { status.textContent = 'ยังไม่ได้ใส่'; status.className = 'api-status'; }
}
function getApiKey() { return document.getElementById('apiKey').value.trim(); }
function saveApiKey() {
  const key = getApiKey();
  if (key.length < 20) { alert('กรุณาใส่ API Key ก่อนครับ'); return; }
  localStorage.setItem('groq_api_key', key);
  event.target.textContent = '✓ บันทึกแล้ว';
  setTimeout(() => event.target.textContent = '💾 จำไว้', 1500);
}
function clearApiKey() {
  localStorage.removeItem('groq_api_key');
  document.getElementById('apiKey').value = '';
  checkApiKey();
  event.target.textContent = '✓ ลบแล้ว';
  setTimeout(() => event.target.textContent = '🗑 ลบ', 1500);
}
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('groq_api_key');
  if (saved) { document.getElementById('apiKey').value = saved; checkApiKey(); }
});

// ── Session ───────────────────────────────────────────────────
async function startSession() {
  if (getApiKey().length < 20) { alert('กรุณาใส่ Groq API Key ก่อนครับ\nสมัครฟรีที่ console.groq.com'); return; }
  const caseId = document.getElementById('scenarioSelect').value;
  currentCase = CASE_REGISTRY[caseId];
  conversationHistory = [];
  dispensedDrugs = '';
  counselingDone = false;
  sessionActive = true;

  document.getElementById('patientAvatar').textContent = currentCase.emoji;
  document.getElementById('patientName').textContent = currentCase.name;
  document.getElementById('patientMeta').textContent = `${currentCase.age} ปี | ${currentCase.occupation} | ระดับ: ${currentCase.difficulty}`;
  document.getElementById('statusDot').className = 'status-dot active';
  document.getElementById('evalSection').style.display = 'none';
  document.getElementById('dispenseBar').className = 'dispense-bar';
  document.getElementById('dispenseLog').className = 'dispense-log';
  document.getElementById('dispenseLog').textContent = '';
  document.getElementById('textInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('micBtn').disabled = false;
  document.getElementById('evalBtn').disabled = false;
  document.getElementById('startBtn').textContent = '🔄 เริ่มใหม่';
  document.getElementById('messages').innerHTML = '';
  // Start timer
  sessionStartTime = Date.now();
  if (timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    const m = String(Math.floor(elapsed / 60)).padStart(2,'0');
    const s = String(elapsed % 60).padStart(2,'0');
    document.getElementById('timerDisplay').textContent = `⏱ ${m}:${s}`;
  }, 1000);
  document.getElementById('timerDisplay').textContent = '⏱ 00:00';

  addSystemMessage(`📋 เคส ${currentCase.name} | ${currentCase.difficulty} | คนไข้จะเปิดบทสนทนาก่อน`);

  const systemPrompt = buildSystemPrompt(currentCase);
  const opening = await callGroq(
    systemPrompt + '\n\nตอนนี้คุณเพิ่งเดินเข้ามาที่เคาน์เตอร์ร้านยาและเห็นเภสัชกร ให้ทักทายสั้นๆ แค่ว่ามาซื้อยา เช่น "สวัสดีครับ มาซื้อยาครับ" หรือ "สวัสดีครับ ขอซื้อยาหน่อยได้ไหมครับ" ห้ามบอกอาการในประโยคแรกเด็ดขาด รอให้เภสัชกรถามก่อน',
    [{ role: 'user', parts: [{ text: 'เริ่ม' }] }]
  );
  addMessage('patient', opening, currentCase.emoji);
  conversationHistory.push({ role: 'model', parts: [{ text: opening }] });
}

async function sendMessage() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text || !sessionActive) return;
  input.value = '';
  autoResize(input);

  addMessage('user', text, '🧑‍⚕️');
  conversationHistory.push({ role: 'user', parts: [{ text }] });

  // Bug 1 fix: ถ้า detect คำจ่ายยา → แสดง dispense bar แล้วหยุด รอ confirmDispense() แทน
  if (detectDispense(text) && !dispensedDrugs) {
    document.getElementById('dispenseBar').className = 'dispense-bar show';
    document.getElementById('dispenseInput').focus();
    document.getElementById('textInput').disabled = true;
    document.getElementById('textInput').placeholder = 'กรอกชื่อยาในช่องด้านบนก่อนนะครับ';
    document.getElementById('sendBtn').disabled = true;
    document.getElementById('micBtn').disabled = true;
    return;
  }

  document.getElementById('sendBtn').disabled = true;
  const tid = addThinking(currentCase.emoji);
  const systemPrompt = buildSystemPrompt(currentCase);
  const response = await callGroq(systemPrompt, conversationHistory);
  removeThinking(tid);
  document.getElementById('sendBtn').disabled = false;

  addMessage('patient', response, currentCase.emoji);
  conversationHistory.push({ role: 'model', parts: [{ text: response }] });
  speakText(response);

  // Bug 3 fix: ปิดจบได้ก็ต่อเมื่อจ่ายยาแล้ว และ counseling จบแล้วเท่านั้น
  if (detectCounselingDone(text)) counselingDone = true;
  if (detectClosing(response) && dispensedDrugs && counselingDone) {
    setTimeout(() => {
      addSystemMessage('✅ การสนทนาจบลงแล้ว กด "ประเมินผล" เพื่อดูคะแนน');
      sessionActive = false;
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      document.getElementById('textInput').disabled = true;
      document.getElementById('sendBtn').disabled = true;
      document.getElementById('micBtn').disabled = true;
    }, 800);
  }
}

function cancelDispense() {
  document.getElementById('dispenseBar').className = 'dispense-bar';
  document.getElementById('dispenseInput').value = '';
  document.getElementById('textInput').disabled = false;
  document.getElementById('textInput').placeholder = 'พิมพ์ หรือกดไมค์พูด...';
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('micBtn').disabled = false;
  document.getElementById('textInput').focus();
}

function confirmDispense() {
  const drugs = document.getElementById('dispenseInput').value.trim();
  if (!drugs) { alert('กรุณาระบุชื่อยาก่อนครับ'); return; }
  dispensedDrugs = drugs;
  document.getElementById('dispenseBar').className = 'dispense-bar';
  document.getElementById('dispenseInput').value = '';

  // re-enable input
  document.getElementById('textInput').disabled = false;
  document.getElementById('textInput').placeholder = 'พิมพ์ หรือกดไมค์พูด...';
  document.getElementById('micBtn').disabled = false;

  const log = document.getElementById('dispenseLog');
  log.className = 'dispense-log show';
  log.innerHTML = `💊 จ่ายยา: <strong>${drugs}</strong>`;

  addSystemMessage(`💊 เภสัชกรจ่ายยา: ${drugs}`);

  const dispenseMsg = `[เภสัชกรจ่ายยา: ${drugs} พร้อมอธิบายวิธีใช้]`;
  conversationHistory.push({ role: 'user', parts: [{ text: dispenseMsg }] });

  ;(async () => {
    document.getElementById('sendBtn').disabled = true;
    const tid = addThinking(currentCase.emoji);
    const response = await callGroq(buildSystemPrompt(currentCase), conversationHistory);
    removeThinking(tid);
    document.getElementById('sendBtn').disabled = false;
    addMessage('patient', response, currentCase.emoji);
    conversationHistory.push({ role: 'model', parts: [{ text: response }] });
    speakText(response);
  })();
}

// ── Evaluation ────────────────────────────────────────────────
async function requestEvaluation() {
  if (conversationHistory.length < 2) { alert('ลองซักประวัติก่อนนะครับ'); return; }
  const evalBtn = document.getElementById('evalBtn');
  evalBtn.disabled = true;
  evalBtn.textContent = '⏳ กำลังประเมิน...';
  const evalSection = document.getElementById('evalSection');
  evalSection.style.display = 'block';
  document.getElementById('evalBody').innerHTML = '<div class="eval-loading">⏳ กำลังวิเคราะห์การสนทนา...</div>';
  evalSection.scrollIntoView({ behavior: 'smooth' });

  const chatLog = conversationHistory
    .map(m => `[${m.role === 'user' ? 'เภสัชกร' : 'ผู้ป่วย'}]: ${m.parts[0].text}`)
    .join('\n');

  const evalPrompt = buildEvalPrompt(currentCase, chatLog, dispensedDrugs);
  const result = await callGroq('คุณเป็นผู้ประเมินการเรียนรู้ด้านเภสัชศาสตร์ ตอบเป็น JSON เท่านั้น ห้ามใส่ backtick หรือ markdown ใดๆ ทั้งสิ้น', [
    { role: 'user', parts: [{ text: evalPrompt }] }
  ], 1500);

  try {
    const data = JSON.parse(result.replace(/```json?|```/g, '').trim());
    renderEval(data);
  } catch {
    document.getElementById('evalBody').innerHTML = `<div class="feedback-block">${escapeHtml(result)}</div>`;
  } finally {
    evalBtn.disabled = false;
    evalBtn.textContent = '📋 ประเมินผล';
  }
}

function renderEval(d) {
  const col = (s, max) => s >= max*0.75 ? 'score-green' : s >= max*0.5 ? 'score-amber' : 'score-red';
  const missed = (arr, label) => arr?.length
    ? `<div class="feedback-block"><h3>${label}</h3>${arr.map(i=>`<div class="missed-item">• ${i}</div>`).join('')}</div>` : '';

  document.getElementById('evalBody').innerHTML = `
    <div class="score-grid">
      <div class="score-card">
        <div class="score-num ${col(d.history_score,30)}">${d.history_score}</div>
        <div class="score-max">/30</div>
        <div class="score-label">การซักประวัติ</div>
      </div>
      <div class="score-card">
        <div class="score-num ${col(d.diagnosis_score,20)}">${d.diagnosis_score}</div>
        <div class="score-max">/20</div>
        <div class="score-label">การวินิจฉัย/ระบุอาการ</div>
      </div>
      <div class="score-card">
        <div class="score-num ${col(d.drug_score,25)}">${d.drug_score}</div>
        <div class="score-max">/25</div>
        <div class="score-label">การเลือกยา</div>
      </div>
      <div class="score-card">
        <div class="score-num ${col(d.counseling_score,25)}">${d.counseling_score}</div>
        <div class="score-max">/25</div>
        <div class="score-label">Counseling</div>
      </div>
      <div class="score-card score-total">
        <div class="score-num">${d.overall}</div>
        <div class="score-max" style="color:rgba(255,255,255,0.6)">/100</div>
        <div class="score-label">คะแนนรวม</div>
      </div>
    </div>

    <div class="feedback-block"><h3>🩺 การซักประวัติ</h3>${d.history_feedback}</div>
    ${missed(d.history_missed, '❌ ประเด็นที่ยังไม่ได้ถาม')}
    <div class="feedback-block"><h3>🔍 การวินิจฉัย/ระบุอาการ</h3>${d.diagnosis_feedback}</div>
    <div class="feedback-block"><h3>💊 การเลือกยา</h3>${d.drug_feedback}</div>
    <div class="feedback-block"><h3>📖 Counseling & Regimen</h3>${d.counseling_feedback}</div>
    ${missed(d.counseling_missed, '❌ Counseling point ที่ขาดไป')}
    ${d.behavior_note ? `<div class="feedback-block"><h3>🗣️ พฤติกรรมการสนทนา</h3>${d.behavior_note}</div>` : ''}
    <div class="feedback-block"><h3>📝 สรุปภาพรวม</h3>${d.summary}</div>
    <button class="btn-new" onclick="newSession()">🔄 เริ่มเคสใหม่</button>`;
}

// ── Groq API ──────────────────────────────────────────────────
async function callGroq(systemInstruction, messages, maxTokens = 300) {
  const apiKey = getApiKey();
  const openaiMessages = [{ role: 'system', content: systemInstruction }];
  for (const m of messages) {
    openaiMessages.push({ role: m.role === 'model' ? 'assistant' : 'user', content: m.parts[0].text });
  }
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({ model: 'llama-3.3-70b-versatile', messages: openaiMessages, max_tokens: maxTokens, temperature: 0.75 })
    });
    if (!res.ok) {
      const err = await res.json();
      if (res.status === 429) return '[เกินขีดจำกัด rate limit — รอสักครู่แล้วลองใหม่ครับ]';
      return `[ข้อผิดพลาด: ${err.error?.message || res.status}]`;
    }
    const data = await res.json();
    return data.choices?.[0]?.message?.content || '[ไม่มีคำตอบ]';
  } catch(e) { return `[Connection error: ${e.message}]`; }
}

// ── Speech ────────────────────────────────────────────────────
function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) { alert('กรุณาใช้ Chrome ครับ'); return; }
  if (isRecording) { recognition?.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'th-TH'; recognition.continuous = false; recognition.interimResults = false;
  recognition.onstart = () => { isRecording = true; document.getElementById('micBtn').className = 'btn-icon btn-mic recording'; document.getElementById('micBtn').textContent = '⏹'; };
  recognition.onend = () => { isRecording = false; document.getElementById('micBtn').className = 'btn-icon btn-mic'; document.getElementById('micBtn').textContent = '🎤'; };
  recognition.onresult = e => { const t = e.results[0][0].transcript; document.getElementById('textInput').value = t; autoResize(document.getElementById('textInput')); sendMessage(); };
  recognition.onerror = () => { isRecording = false; document.getElementById('micBtn').className = 'btn-icon btn-mic'; document.getElementById('micBtn').textContent = '🎤'; };
  recognition.start();
}
function speakText(text) {
  if ('speechSynthesis' in window) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(text); u.lang = 'th-TH'; window.speechSynthesis.speak(u); }
}

// ── UI helpers ────────────────────────────────────────────────
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function addMessage(type, text, avatar) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  const time = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div><div class="msg-bubble">${escapeHtml(text)}</div><div class="msg-time">${time}</div></div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function addSystemMessage(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="msg-avatar">ℹ️</div><div class="msg-bubble">${text}</div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}
function addThinking(avatar) {
  const id = `t${++thinkingCounter}`;
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg patient'; div.id = id;
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
  return id;
}
function removeThinking(id) { document.getElementById(id)?.remove(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

// detect ว่าเภสัชกร counseling จบแล้ว
function detectCounselingDone(text) {
  const triggers = [
    'เรียบร้อย', 'มีอะไรอีกไหม', 'ไม่มีอะไรแล้ว', 'โชคดีนะ',
    'หายไวๆนะ', 'หายไวๆ', 'ดูแลตัวเองด้วย', 'ฝากดูแลตัวเองด้วย',
    'ถ้ามีอะไรก็แวะมาใหม่', 'สอบถามเพิ่มเติมได้', 'มีคำถามอะไรอีกไหม'
  ];
  return triggers.some(t => text.includes(t));
}

function onScenarioChange() {}
function newSession() { document.getElementById('evalSection').style.display = 'none'; startSession(); }
</script>
