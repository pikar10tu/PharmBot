<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PharmBot v2 — ฝึกปฏิบัติร้านยา</title>
  <link rel="stylesheet" href="css/main.css?v=3" />

  <!-- Firebase SDK (compat v9) -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="app"></div>

<!-- Core modules (load order matters) — v3.0 -->
<script src="js/firebase-config.js?v=3"></script>
<script src="js/gemini.js?v=4"></script>
<script src="js/gemini-live.js?v=17"></script>
<script src="js/gemini-tts.js?v=3"></script>
<script src="js/auth.js?v=3"></script>
<script src="js/db.js?v=3"></script>
<script src="js/prompts.js?v=4"></script>
<script src="js/drug-data.js?v=3"></script>

<!-- Screens -->
<script src="js/screens/login.js?v=3"></script>
<script src="js/screens/dashboard.js?v=3"></script>
<script src="js/screens/groups.js?v=3"></script>
<script src="js/screens/cases.js?v=3"></script>
<script src="js/screens/drugs-modal.js?v=3"></script>
<script src="js/screens/chat.js?v=9"></script>
<script src="js/screens/summary.js?v=3"></script>
<script src="js/screens/history.js?v=3"></script>
<script src="js/screens/admin.js?v=3"></script>

<!-- Router (init last) -->
<script src="js/router.js?v=3"></script>
<script>
  // Wait for Firebase Auth to restore session before first route dispatch
  onAuthReady((user) => {
    const hash = window.location.hash.replace('#', '');
    if (!user && hash !== 'login' && hash !== '') {
      window.location.hash = '#login';
    } else if (user && (!hash || hash === 'login')) {
      window.location.hash = '#dashboard';
    }
    Router.init();
  });
</script>

</body>
</html>
