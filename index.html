<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PharmBot — ฝึกซักประวัติจ่ายยา (Groq)</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --cream: #fefae0;
    --amber: #dda15e;
    --red-soft: #e76f51;
    --text: #1b2e23;
    --text-muted: #4a7c5f;
    --white: #ffffff;
    --shadow: 0 4px 24px rgba(26,58,42,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Sarabun', sans-serif;
    background: var(--green-dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background-image: 
      radial-gradient(ellipse at 20% 50%, rgba(82,183,136,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(221,161,94,0.06) 0%, transparent 50%);
  }
  .app { width: 100%; max-width: 820px; display: flex; flex-direction: column; gap: 16px; }

  .header {
    background: linear-gradient(135deg, var(--green-mid), var(--green-dark));
    border: 1px solid rgba(82,183,136,0.3);
    border-radius: 20px;
    padding: 20px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: var(--shadow);
  }
  .header-left { display: flex; align-items: center; gap: 14px; }
  .logo { width: 48px; height: 48px; background: var(--green-light); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
  .header h1 { font-family: 'Noto Serif Thai', serif; color: var(--white); font-size: 20px; font-weight: 700; line-height: 1.2; }
  .header p { color: rgba(255,255,255,0.6); font-size: 13px; margin-top: 2px; }

  .api-section {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(82,183,136,0.2);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .api-section label { color: rgba(255,255,255,0.7); font-size: 13px; white-space: nowrap; }
  .api-section input {
    flex: 1;
    min-width: 200px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(82,183,136,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    color: white;
    font-family: 'Sarabun', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }
  .api-section input:focus { border-color: var(--green-light); }
  .api-section input::placeholder { color: rgba(255,255,255,0.3); }
  .api-hint { color: rgba(255,255,255,0.45); font-size: 12px; }
  .api-status { font-size: 11px; white-space: nowrap; padding: 4px 10px; border-radius: 20px; }
  .api-status.ok { background: rgba(82,183,136,0.2); color: var(--green-light); }
  .api-status.err { background: rgba(231,111,81,0.2); color: var(--red-soft); }

  .scenario-section {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(82,183,136,0.2);
    border-radius: 16px;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .scenario-section label { color: rgba(255,255,255,0.7); font-size: 13px; white-space: nowrap; }
  .scenario-section select {
    flex: 1;
    min-width: 200px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(82,183,136,0.25);
    border-radius: 10px;
    padding: 10px 14px;
    color: white;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    outline: none;
    cursor: pointer;
  }
  .btn-start {
    background: var(--green-light);
    color: var(--green-dark);
    border: none;
    border-radius: 10px;
    padding: 10px 22px;
    font-family: 'Sarabun', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-start:hover { background: #74c69d; transform: translateY(-1px); }
  .btn-start:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .chat-container {
    background: var(--cream);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: var(--shadow);
    display: flex;
    flex-direction: column;
    min-height: 420px;
  }
  .chat-header {
    background: var(--green-mid);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .patient-info { display: flex; align-items: center; gap: 10px; }
  .patient-avatar { width: 38px; height: 38px; background: var(--green-pale); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .patient-name { color: white; font-weight: 600; font-size: 15px; }
  .patient-role { color: rgba(255,255,255,0.6); font-size: 12px; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #aaa; transition: background 0.3s; }
  .status-dot.active { background: #69d38e; box-shadow: 0 0 8px #69d38e; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-height: 300px;
    max-height: 420px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(45,106,79,0.3); border-radius: 4px; }

  .msg { display: flex; gap: 10px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { flex-direction: row-reverse; }
  .msg-avatar { width: 34px; height: 34px; flex-shrink: 0; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .msg.patient .msg-avatar { background: var(--green-pale); }
  .msg.user .msg-avatar { background: rgba(221,161,94,0.2); }
  .msg.system .msg-avatar { background: rgba(231,111,81,0.15); }

  .msg-bubble { max-width: 70%; padding: 12px 16px; border-radius: 16px; font-size: 15px; line-height: 1.6; color: var(--text); }
  .msg.patient .msg-bubble { background: white; border-bottom-left-radius: 4px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .msg.user .msg-bubble { background: var(--green-mid); color: white; border-bottom-right-radius: 4px; }
  .msg.system .msg-bubble { background: rgba(231,111,81,0.1); border: 1px solid rgba(231,111,81,0.2); color: #c1440e; font-size: 13px; border-radius: 12px; max-width: 100%; width: 100%; text-align: center; }
  .msg-time { font-size: 11px; color: var(--text-muted); margin-top: 4px; }
  .msg.user .msg-time { text-align: right; }

  .thinking { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .thinking span { width: 7px; height: 7px; border-radius: 50%; background: var(--green-light); animation: bounce 1.2s infinite; }
  .thinking span:nth-child(2) { animation-delay: 0.2s; }
  .thinking span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

  .input-area { border-top: 1px solid rgba(45,106,79,0.1); padding: 14px 16px; display: flex; gap: 10px; align-items: flex-end; background: white; }
  #textInput {
    flex: 1;
    border: 1px solid rgba(45,106,79,0.2);
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'Sarabun', sans-serif;
    font-size: 15px;
    color: var(--text);
    resize: none;
    outline: none;
    line-height: 1.5;
    max-height: 120px;
    transition: border-color 0.2s;
  }
  #textInput:focus { border-color: var(--green-light); }
  #textInput::placeholder { color: #aaa; }
  #textInput:disabled { background: #f5f5f5; }

  .btn-icon { width: 46px; height: 46px; border-radius: 14px; border: none; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; }
  .btn-mic { background: var(--green-pale); color: var(--green-mid); }
  .btn-mic:hover { background: var(--green-light); color: white; }
  .btn-mic.recording { background: var(--red-soft); color: white; animation: pulse 1s infinite; }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .btn-send { background: var(--green-mid); color: white; }
  .btn-send:hover { background: var(--green-dark); }
  .btn-send:disabled { opacity: 0.3; cursor: not-allowed; }

  .eval-section { display: none; background: var(--cream); border-radius: 20px; overflow: hidden; box-shadow: var(--shadow); }
  .eval-header { background: var(--green-dark); padding: 16px 24px; color: white; font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
  .eval-body { padding: 20px 24px; }
  .eval-loading { text-align: center; padding: 30px; color: var(--text-muted); }
  .score-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
  .score-card { background: white; border-radius: 14px; padding: 14px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .score-num { font-size: 32px; font-weight: 700; font-family: 'Noto Serif Thai', serif; }
  .score-label { font-size: 12px; color: var(--text-muted); margin-top: 4px; }
  .score-green { color: var(--green-mid); }
  .score-amber { color: var(--amber); }
  .score-red { color: var(--red-soft); }
  .feedback-block { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; font-size: 14px; line-height: 1.8; color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.06); white-space: pre-wrap; }
  .feedback-block h3 { font-size: 14px; font-weight: 700; color: var(--green-mid); margin-bottom: 8px; }
  .btn-new { width: 100%; background: var(--green-mid); color: white; border: none; border-radius: 12px; padding: 14px; font-family: 'Sarabun', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .btn-new:hover { background: var(--green-dark); }
  .btn-eval { background: var(--amber); color: white; border: none; border-radius: 10px; padding: 10px 20px; font-family: 'Sarabun', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
  .btn-eval:hover { opacity: 0.85; }
  .btn-eval:disabled { opacity: 0.4; cursor: not-allowed; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div class="header-left">
      <div class="logo">💊</div>
      <div>
        <h1>PharmBot</h1>
        <p>ระบบฝึกซักประวัติและจ่ายยา สำหรับนักศึกษาเภสัชศาสตร์</p>
      </div>
    </div>
    <button class="btn-eval" id="evalBtn" disabled onclick="requestEvaluation()">📋 ประเมินผล</button>
  </div>

  <!-- API KEY -->
  <div class="api-section">
    <label>🔑 Groq API Key:</label>
    <input type="password" id="apiKey" placeholder="gsk_..." oninput="checkApiKey()">
    <span class="api-hint">สมัครฟรีที่ console.groq.com → API Keys</span>
    <span class="api-status" id="apiStatus">ยังไม่ได้ใส่</span>
  </div>

  <!-- SCENARIO -->
  <div class="scenario-section">
    <label>🏥 เลือก Scenario:</label>
    <select id="scenarioSelect">
      <option value="fever">🤒 ไข้ / หวัด / ปวดศีรษะ</option>
      <option value="stomach">🤢 ปวดท้อง / ท้องเสีย / คลื่นไส้</option>
      <option value="cough">😷 ไอ / เจ็บคอ / มีเสมหะ</option>
      <option value="allergy">🤧 แพ้อาหาร / ผื่นคัน</option>
      <option value="pain">🦵 ปวดกล้ามเนื้อ / ปวดข้อ</option>
    </select>
    <button class="btn-start" id="startBtn" onclick="startSession()">▶ เริ่มเคส</button>
  </div>

  <!-- CHAT -->
  <div class="chat-container">
    <div class="chat-header">
      <div class="patient-info">
        <div class="patient-avatar" id="patientAvatar">👤</div>
        <div>
          <div class="patient-name" id="patientName">รอเริ่มเคส...</div>
          <div class="patient-role">ผู้ป่วยจำลอง (ขับเคลื่อนด้วย Groq AI)</div>
        </div>
      </div>
      <div class="status-dot" id="statusDot"></div>
    </div>

    <div class="messages" id="messages">
      <div class="empty-state">
        <div class="icon">🩺</div>
        <p>ใส่ Gemini API Key แล้วเลือก Scenario<br>กด <strong>"เริ่มเคส"</strong> เพื่อเริ่มฝึกซักประวัติ</p>
      </div>
    </div>

    <div class="input-area">
      <textarea id="textInput" rows="1" placeholder="พิมพ์คำถาม หรือกดไมค์เพื่อพูด..." 
        onkeydown="handleKey(event)" oninput="autoResize(this)" disabled></textarea>
      <button class="btn-icon btn-mic" id="micBtn" title="กดพูด" onclick="toggleMic()" disabled>🎤</button>
      <button class="btn-icon btn-send" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
    </div>
  </div>

  <!-- EVAL -->
  <div class="eval-section" id="evalSection">
    <div class="eval-header">📊 ผลการประเมิน</div>
    <div class="eval-body" id="evalBody">
      <div class="eval-loading">⏳ กำลังวิเคราะห์...</div>
    </div>
  </div>

</div>

<script>
const SCENARIOS = {
  fever: {
    emoji: '🤒', name: 'สมชาย ใจดี',
    system: `คุณเล่นบทเป็น สมชาย อายุ 35 ปี พนักงานออฟฟิศ มาที่ร้านยาเพราะมีไข้ต่ำๆ ปวดหัว และน้ำมูกไหลมา 2 วัน ไม่มีโรคประจำตัว ไม่แพ้ยา ไม่ได้กินยาอะไรอยู่ อุณหภูมิประมาณ 37.8 องศา ไม่มีอาการหายใจลำบาก ไม่มีผื่น กฎ: ตอบเป็นภาษาไทยสั้นๆ เป็นธรรมชาติ บอกข้อมูลเฉพาะเมื่อถูกถาม ห้ามพูดชื่อยาหรือ diagnosis เอง ตอบไม่เกิน 2-3 ประโยค`
  },
  stomach: {
    emoji: '🤢', name: 'มาลี รักสุข',
    system: `คุณเล่นบทเป็น มาลี อายุ 28 ปี มาร้านยาเพราะปวดท้อง ท้องเสีย ถ่ายเหลว 4-5 ครั้งวันนี้ ไม่มีเลือดในอุจจาระ คลื่นไส้เล็กน้อย เพิ่งกินอาหารทะเลเมื่อคืน ไม่มีไข้ ไม่แพ้ยา ไม่มีโรคประจำตัว ไม่ตั้งครรภ์ กฎ: ตอบสั้นๆ เป็นธรรมชาติ บอกข้อมูลเมื่อถูกถามเท่านั้น ตอบไม่เกิน 2-3 ประโยค`
  },
  cough: {
    emoji: '😷', name: 'วิชัย มั่นคง',
    system: `คุณเล่นบทเป็น วิชัย อายุ 45 ปี มาร้านยาเพราะไอมา 3 วัน มีเสมหะสีเหลืองเล็กน้อย เจ็บคอ ไม่มีไข้ ไม่มีหายใจลำบาก สูบบุหรี่วันละ 5 มวนมาหลายปี ไม่แพ้ยา ไม่มีโรคประจำตัว กฎ: ตอบสั้นๆ เป็นธรรมชาติ บอกข้อมูลเมื่อถูกถามเท่านั้น ตอบไม่เกิน 2-3 ประโยค`
  },
  allergy: {
    emoji: '🤧', name: 'นภา สดใส',
    system: `คุณเล่นบทเป็น นภา อายุ 22 ปี นักศึกษา มีผื่นคันขึ้นที่แขนและขาหลังกินกุ้งเมื่อ 2 ชั่วโมงก่อน ผื่นนูนแดง คันมาก ไม่มีหายใจลำบาก ไม่มีบวมที่ปาก/ลำคอ เคยแพ้กุ้งมาครั้งหนึ่งแต่ไม่รุนแรง ไม่แพ้ยา กฎ: ตอบสั้นๆ เป็นธรรมชาติ บอกข้อมูลเมื่อถูกถามเท่านั้น ตอบไม่เกิน 2-3 ประโยค`
  },
  pain: {
    emoji: '🦵', name: 'ประสิทธิ์ แข็งแรง',
    system: `คุณเล่นบทเป็น ประสิทธิ์ อายุ 52 ปี ออกกำลังกายเมื่อวานแล้วปวดน่องและต้นขา ปวดระดับ 5/10 ไม่มีบวม ไม่มีแดง เดินได้ปกติ ไม่มีประวัติเจ็บออก ไม่แพ้ยา มีความดันโลหิตสูง กินยา Amlodipine อยู่ กฎ: ตอบสั้นๆ เป็นธรรมชาติ บอกข้อมูลเมื่อถูกถามเท่านั้น ตอบไม่เกิน 2-3 ประโยค`
  }
};

const EVAL_CHECKLIST = {
  fever: { history: ['ระยะเวลาที่มีอาการ','ระดับไข้/อุณหภูมิ','อาการร่วม (ไอ/เจ็บคอ/น้ำมูก)','โรคประจำตัว','ยาที่ใช้อยู่','ประวัติแพ้ยา'], drug: 'Paracetamol และยาแก้หวัดตามอาการ ไม่ควรให้ NSAIDs โดยไม่จำเป็น' },
  stomach: { history: ['จำนวนครั้งที่ถ่าย','ลักษณะอุจจาระ (มีเลือด/เมือก?)','ประวัติอาหาร','มีคลื่นไส้/อาเจียน?','มีไข้?','ไม่ตั้งครรภ์?'], drug: 'ORS เป็นหลัก อาจให้ Loperamide ถ้าไม่มีไข้/เลือด' },
  cough: { history: ['ระยะเวลาไอ','ลักษณะเสมหะ (สี/ปริมาณ)','มีไข้?','หายใจลำบาก?','ประวัติสูบบุหรี่','โรคประจำตัว'], drug: 'ยาละลายเสมหะ ± ยาแก้อักเสบ ถ้าเสมหะเหลืองควรพิจารณาส่งแพทย์' },
  allergy: { history: ['สิ่งที่กิน/สัมผัส','ลักษณะผื่น','มีหายใจลำบาก/บวม?','ระยะเวลา','ประวัติแพ้ก่อนหน้า'], drug: 'Antihistamine (CPM หรือ Loratadine) ไม่ใช่ Steroid ในกรณีเบา' },
  pain: { history: ['สาเหตุ/กิจกรรม','ตำแหน่งปวด','ระดับความปวด (0-10)','มีบวม/แดง?','ยาที่ใช้อยู่ (สำคัญมาก!)'], drug: 'Paracetamol ก่อน (ผู้ป่วยกิน Amlodipine — ระวัง NSAIDs เรื่อง interaction)' }
};

let conversationHistory = [];
let currentScenario = null;
let sessionActive = false;
let recognition = null;
let isRecording = false;
let thinkingCounter = 0;

function checkApiKey() {
  const key = document.getElementById('apiKey').value.trim();
  const status = document.getElementById('apiStatus');
  if (key.length > 20) {
    status.textContent = '✓ พร้อมใช้งาน';
    status.className = 'api-status ok';
  } else if (key.length > 0) {
    status.textContent = '✗ รูปแบบไม่ถูกต้อง';
    status.className = 'api-status err';
  } else {
    status.textContent = 'ยังไม่ได้ใส่';
    status.className = 'api-status';
  }
}

function getApiKey() { return document.getElementById('apiKey').value.trim(); }

async function startSession() {
  const apiKey = getApiKey();
  if (apiKey.length < 20) {
    alert('กรุณาใส่ Groq API Key ที่ถูกต้องก่อนครับ\nสมัครฟรีที่ console.groq.com');
    return;
  }
  currentScenario = document.getElementById('scenarioSelect').value;
  const sc = SCENARIOS[currentScenario];
  conversationHistory = [];
  sessionActive = true;

  document.getElementById('patientAvatar').textContent = sc.emoji;
  document.getElementById('patientName').textContent = sc.name;
  document.getElementById('statusDot').className = 'status-dot active';
  document.getElementById('evalSection').style.display = 'none';
  document.getElementById('textInput').disabled = false;
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('micBtn').disabled = false;
  document.getElementById('evalBtn').disabled = false;
  document.getElementById('startBtn').textContent = '🔄 เริ่มใหม่';

  const messages = document.getElementById('messages');
  messages.innerHTML = '';
  addSystemMessage(`📋 เคส: ${sc.name} | ซักประวัติให้ครบแล้วกด "ประเมินผล"`);

  const opening = await callGroq(sc.system, [
    { role: 'user', parts: [{ text: 'สวัสดีครับ มีอะไรให้ช่วยไหมครับ?' }] }
  ]);
  addMessage('patient', opening, sc.emoji);
  conversationHistory.push(
    { role: 'user', parts: [{ text: 'สวัสดีครับ มีอะไรให้ช่วยไหมครับ?' }] },
    { role: 'model', parts: [{ text: opening }] }
  );
}

async function sendMessage() {
  const input = document.getElementById('textInput');
  const text = input.value.trim();
  if (!text || !sessionActive) return;
  input.value = '';
  autoResize(input);

  const sc = SCENARIOS[currentScenario];
  addMessage('user', text, '🧑‍⚕️');
  conversationHistory.push({ role: 'user', parts: [{ text }] });

  document.getElementById('sendBtn').disabled = true;
  const thinkingId = addThinking(sc.emoji);

  const response = await callGroq(sc.system, conversationHistory);
  removeThinking(thinkingId);
  document.getElementById('sendBtn').disabled = false;

  addMessage('patient', response, sc.emoji);
  conversationHistory.push({ role: 'model', parts: [{ text: response }] });
  speakText(response);
}

async function requestEvaluation() {
  if (conversationHistory.length < 2) { alert('ลองซักประวัติก่อนนะครับ'); return; }
  const evalSection = document.getElementById('evalSection');
  evalSection.style.display = 'block';
  document.getElementById('evalBody').innerHTML = '<div class="eval-loading">⏳ กำลังวิเคราะห์การสนทนา...</div>';
  evalSection.scrollIntoView({ behavior: 'smooth' });

  const sc = SCENARIOS[currentScenario];
  const checklist = EVAL_CHECKLIST[currentScenario];
  const chatLog = conversationHistory.map(m => `[${m.role === 'user' ? 'นศ.เภสัช' : 'ผู้ป่วย'}]: ${m.parts[0].text}`).join('\n');

  const evalPrompt = `คุณเป็นผู้เชี่ยวชาญประเมินทักษะการซักประวัติจ่ายยาของนักศึกษาเภสัชศาสตร์

Scenario: ${sc.name}
Checklist ที่ควรถาม: ${checklist.history.join(', ')}
ยาที่ควรแนะนำ: ${checklist.drug}

บทสนทนา:
${chatLog}

ตอบเป็น JSON เท่านั้น ห้ามใส่ backtick หรือ markdown:
{"history_score":0-100,"drug_score":0-100,"overall":0-100,"missed_items":["..."],"good_points":"...","improvements":"...","drug_feedback":"...","summary":"..."}`;

  const result = await callGroq('คุณเป็นผู้ประเมินการเรียนรู้ด้านเภสัชศาสตร์ ตอบเป็น JSON เท่านั้น', [
    { role: 'user', parts: [{ text: evalPrompt }] }
  ]);

  try {
    const clean = result.replace(/```json?|```/g, '').trim();
    const data = JSON.parse(clean);
    renderEval(data);
  } catch {
    document.getElementById('evalBody').innerHTML = `<div class="feedback-block">${result}</div>`;
  }
}

function renderEval(data) {
  const getColor = s => s >= 75 ? 'score-green' : s >= 50 ? 'score-amber' : 'score-red';
  const missedHTML = data.missed_items?.length
    ? `<div class="feedback-block"><h3>❌ ประเด็นที่ยังไม่ได้ถาม</h3>${data.missed_items.map(i => `• ${i}`).join('\n')}</div>`
    : `<div class="feedback-block"><h3>✅ ถามครบทุกประเด็น!</h3></div>`;

  document.getElementById('evalBody').innerHTML = `
    <div class="score-grid">
      <div class="score-card"><div class="score-num ${getColor(data.history_score)}">${data.history_score}</div><div class="score-label">การซักประวัติ</div></div>
      <div class="score-card"><div class="score-num ${getColor(data.drug_score)}">${data.drug_score}</div><div class="score-label">การจ่ายยา</div></div>
      <div class="score-card"><div class="score-num ${getColor(data.overall)}">${data.overall}</div><div class="score-label">ภาพรวม</div></div>
    </div>
    ${missedHTML}
    <div class="feedback-block"><h3>👍 จุดเด่น</h3>${data.good_points}</div>
    <div class="feedback-block"><h3>💡 ควรปรับปรุง</h3>${data.improvements}</div>
    <div class="feedback-block"><h3>💊 การจ่ายยา</h3>${data.drug_feedback}</div>
    <div class="feedback-block"><h3>📝 สรุป</h3>${data.summary}</div>
    <button class="btn-new" onclick="newSession()">🔄 เริ่มเคสใหม่</button>`;
}

async function callGroq(systemInstruction, messages) {
  const apiKey = getApiKey();
  // Convert Gemini-style messages to OpenAI format
  const openaiMessages = [{ role: 'system', content: systemInstruction }];
  for (const m of messages) {
    openaiMessages.push({
      role: m.role === 'model' ? 'assistant' : 'user',
      content: m.parts[0].text
    });
  }
  try {
    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: openaiMessages,
        max_tokens: 500,
        temperature: 0.7
      })
    });
    if (!res.ok) {
      const err = await res.json();
      if (res.status === 429) return '[เกินขีดจำกัด free tier — รอสักครู่แล้วลองใหม่ครับ]';
      return `[ข้อผิดพลาด: ${err.error?.message || res.status}]`;
    }
    const data = await res.json();
    return data.choices?.[0]?.message?.content || '[ไม่มีคำตอบ]';
  } catch (e) {
    return `[Connection error: ${e.message}]`;
  }
}

// Speech
function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    alert('กรุณาใช้ Chrome เพื่อรองรับการพูดภาษาไทยครับ');
    return;
  }
  if (isRecording) { recognition?.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'th-TH';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.onstart = () => { isRecording = true; document.getElementById('micBtn').className = 'btn-icon btn-mic recording'; document.getElementById('micBtn').textContent = '⏹'; };
  recognition.onend = () => { isRecording = false; document.getElementById('micBtn').className = 'btn-icon btn-mic'; document.getElementById('micBtn').textContent = '🎤'; };
  recognition.onresult = e => { const text = e.results[0][0].transcript; document.getElementById('textInput').value = text; autoResize(document.getElementById('textInput')); sendMessage(); };
  recognition.onerror = () => { isRecording = false; document.getElementById('micBtn').className = 'btn-icon btn-mic'; document.getElementById('micBtn').textContent = '🎤'; };
  recognition.start();
}

function speakText(text) {
  if ('speechSynthesis' in window) {
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.lang = 'th-TH';
    window.speechSynthesis.speak(utter);
  }
}

function addMessage(type, text, avatar) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${type}`;
  const time = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div><div class="msg-bubble">${text}</div><div class="msg-time">${time}</div></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

function addSystemMessage(text) {
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="msg-avatar">ℹ️</div><div class="msg-bubble">${text}</div>`;
  messages.appendChild(div);
}

function addThinking(avatar) {
  const id = `thinking-${++thinkingCounter}`;
  const messages = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg patient';
  div.id = id;
  div.innerHTML = `<div class="msg-avatar">${avatar}</div><div class="msg-bubble"><div class="thinking"><span></span><span></span><span></span></div></div>`;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return id;
}

function removeThinking(id) { document.getElementById(id)?.remove(); }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function newSession() { document.getElementById('evalSection').style.display = 'none'; startSession(); }
</script>
